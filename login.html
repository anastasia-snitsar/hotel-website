<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Nord Hotel & Spa</title>
  <link rel="stylesheet" href="visual/styles.css">
  <link rel="stylesheet" href="visual/login-styles.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <header class = "login-header">
        <div class = "header-inner container">
            <div class = "brand">
                <img src = "images/logo.png" alt="Nord Hotel & Spa logo" class="logo" loading="lazy">
                <h1>Nord Hotel & Spa</h1>
            </div>
            <nav class = "main-nav">
                <a href = "index.html">Home</a>
                <a href = "register.html" class = "register-btn">Sign up</a>
            </nav>
            
        </div>
    </header>

    <main class = "container">
                <h2>Log in</h2>
                <form id = "loginForm">
                    <label>Email:<input type = "email" name = "email" required></label>
                    <label>Password:<input type = "password" name = "password" required></label>
                    <button type = "submit">Login</button>
                </form>
            </main>
    <script src="js/login.js"></script>
</body>
</html>
